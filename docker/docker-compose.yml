version: "3.9"

services:
  nginx:
    image: nginx
    ports:
      - "8084:80"
    volumes:
      - ./etc/nginx.conf:/etc/nginx/nginx.conf:ro

  jmix_pm_app-1:
    image: jmixpm:latest
    environment:
      SPRING_PROFILES_ACTIVE: prod
      VAULT_TOKEN: myroot
      VAULT_HOST: jmix_pm_vault
      DEFAULT_USERNAME: admin

  jmix_pm_app-2:
    image: jmixpm:latest
    environment:
      SPRING_PROFILES_ACTIVE: prod
      VAULT_TOKEN: myroot
      VAULT_HOST: jmix_pm_vault
      DEFAULT_USERNAME: admin

  jmix_pm_postgres:
    image: bitnamilegacy/pgpool:latest
    environment:
      - PGPOOL_BACKEND_NODES=0:jmix_pm_postgres-1:5432,1:jmix_pm_postgres-2:5432
      - PGPOOL_SR_CHECK_USER=postgres
      - PGPOOL_SR_CHECK_PASSWORD=postgres
      - PGPOOL_SR_CHECK_PERIOD=10
      - PGPOOL_POSTGRES_USERNAME=postgres
      - PGPOOL_POSTGRES_PASSWORD=postgres
      - PGPOOL_ADMIN_USERNAME=admin
      - PGPOOL_ADMIN_PASSWORD=postgres
      - PGPOOL_HEALTH_CHECK_PERIOD=1
      - PGPOOL_HEALTH_CHECK_TIMEOUT=1
      - PGPOOL_HEALTH_CHECK_MAX_RETRIES=1
      - PGPOOL_HEALTH_CHECK_RETRY_DELAY=3
    depends_on:
      - jmix_pm_postgres-1
      - jmix_pm_postgres-2

  jmix_pm_postgres-1:
    image: bitnamilegacy/postgresql-repmgr:latest
    environment:
      - POSTGRESQL_POSTGRES_PASSWORD=postgres
      - POSTGRESQL_USERNAME=postgres
      - POSTGRESQL_PASSWORD=postgres
      - POSTGRESQL_DATABASE=jmixpm_docker_replicated
      - REPMGR_PASSWORD=repmgrpassword
      - REPMGR_PRIMARY_HOST=jmix_pm_postgres-1
      - REPMGR_PARTNER_NODES=jmix_pm_postgres-1,jmix_pm_postgres-2
      - REPMGR_NODE_NAME=jmix_pm_postgres-1
      - REPMGR_NODE_NETWORK_NAME=jmix_pm_postgres-1

  jmix_pm_postgres-2:
    image: bitnamilegacy/postgresql-repmgr:latest
    environment:
      - POSTGRESQL_POSTGRES_PASSWORD=postgres
      - POSTGRESQL_USERNAME=postgres
      - POSTGRESQL_PASSWORD=postgres
      - POSTGRESQL_DATABASE=jmixpm_docker_replicated
      - REPMGR_PASSWORD=repmgrpassword
      - REPMGR_PRIMARY_HOST=jmix_pm_postgres-1
      - REPMGR_PARTNER_NODES=jmix_pm_postgres-1,jmix_pm_postgres-2
      - REPMGR_NODE_NAME=jmix_pm_postgres-2
      - REPMGR_NODE_NETWORK_NAME=jmix_pm_postgres-2

  jmix_pm_vault:
    image: hashicorp/vault:latest
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: myroot
    ports:
      - "8200:8200"